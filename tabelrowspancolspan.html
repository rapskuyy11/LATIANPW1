<!DOCTYPE html>
<html>
<head>
    <title>Tabel</title>
</head>
<body>
    <p>Tabel pegawai dengan atribut rowspan</p>
    <table border="1" width="100%">
        <tr>
            <th>Kode</th>
            <th>Nama Pegawai</th>
            <th>Prodi</th>
        </tr>
        <tr>
            <td>0001</td>
            <td>Muhammad</td>
            <td rowspan="2">Manajemen Informatika</td>
        </tr>
        <tr>
            <td>0002</td>
            <td>Nur</td>
        </tr>
    </table>

    <p>Tabel pegawai dengan atribut colspan</p>
    <table border="1" width="100%">
        <tr>
            <th>Kode</th>
            <th>Nama Pegawai</th>
            <th colspan="2">Telepon</th>
        </tr>
        <tr>
            <td>0001</td>
            <td>Muhammad</td>
            <td>0812 345 661</td>
            <td>0812 345 662</td>
        </tr>
        <tr>
            <td>0002</td>
            <td>Nur</td>
            <td>0812 345 671</td>
            <td>0812 345 672</td>
        </tr>
    </table>
</body>
</html>
